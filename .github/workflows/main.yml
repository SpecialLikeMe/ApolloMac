name: Mac Interactive Terminal
on: [workflow_dispatch]

jobs:
  terminal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          # This is the secret—it forces a web link instead of just SSH
          connect-timeout-seconds: 60
          
      - name: Keep Alive
        run: sleep 600 # Keeps the runner active for 10 minutes
