name: Interactive Mac Terminal (Fixed)
on: 
  workflow_dispatch:

jobs:
  interactive-session:
    runs-on: macos-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Interactive Terminal (Upterm)
        uses: lhotari/action-upterm@v1
        with:
          # This disables the SSH key requirement
          limit-access-to-actor: false 
          wait-timeout-minutes: 60 
