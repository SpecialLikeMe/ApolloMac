name: Interactive Mac (Ngrok)
on: workflow_dispatch

jobs:
  terminal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH via Ngrok
        # This action sets up a tunnel specifically for terminal access
        uses: lhotari/action-upterm@v1
        with:
          ## We use Upterm's logic but through a different connection if needed
          limit-access-to-actor: false
          wait-timeout-minutes: 60
