name: Browser-Based Mac Terminal
on: workflow_dispatch

jobs:
  mac-session:
    runs-on: macos-latest
    steps:
      - name: Install Cloudflared
        run: brew install cloudflared

      - name: Start Terminal Tunnel
        run: |
          # This starts a quick tunnel and prints the URL to your logs
          cloudflared access tcp --hostname ://trycloudflare.com --url localhost:22 &
          
          # This starts a web-based terminal session
          npx gotty -w --port 8080 zsh &
          
          # This creates the public link you will click
          cloudflared tunnel --url http://localhost:8080
